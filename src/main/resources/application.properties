# Base Spring Boot configuration for local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/demo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

firebase.service.account=${FIREBASE_SERVICE_ACCOUNT:classpath:skills-lock.json}
