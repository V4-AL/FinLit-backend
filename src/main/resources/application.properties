spring.application.name=demo
server.port=${PORT:8080}


spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Local dev: classpath file (gitignored, each developer keeps their own copy).
# Prod: FIREBASE_SERVICE_ACCOUNT_JSON env var (raw JSON or base64) takes precedence.
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}
firebase.service.account.json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

paystack.secret.key=${PAYSTACK_SECRET_KEY:}
paystack.base.url=${PAYSTACK_BASE_URL:https://api.paystack.co}
subscription.price.kobo=${SUBSCRIPTION_PRICE_KOBO:2000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:5173}
